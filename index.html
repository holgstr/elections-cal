<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f1219" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#f3f5f9" media="(prefers-color-scheme: light)" />
  <meta name="description" content="Upcoming elections in OECD, BRICS, and other major countries over the next 12 months." />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Election Calendar</title>
  <link rel="icon" href="logo.png" type="image/png" sizes="64x64" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" sizes="180x180" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet" />
  <link id="app-css" rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="page">
    <header class="page-header">
      <time class="data-updated" id="data-updated" datetime=""></time>
      <h1 class="site-title">
        <img class="site-logo" src="logo.png" alt="" width="32" height="32" />
        Election Calendar
      </h1>
      <nav class="tab-bar" aria-label="Sections">
        <button type="button" class="tab-btn is-active" data-tab="calendar" aria-selected="true">Calendar</button>
        <button type="button" class="tab-btn" data-tab="suggestions" aria-selected="false">Market moves</button>
        <button type="button" class="tab-btn" data-tab="trends" aria-selected="false">Trends</button>
      </nav>
      <div class="toolbar" id="calendar-toolbar" aria-label="Filter elections">
        <label class="search-wrap">
          <span class="sr-only">Search</span>
          <input type="search" id="search" placeholder="Search country, state, office…" autocomplete="off" enterkeyhint="search" />
        </label>
      </div>
    </header>

    <main>
      <section class="timeline tab-panel is-active" id="timeline" data-panel="calendar" aria-live="polite">
        <p class="loading">Loading elections…</p>
      </section>
      <section class="timeline tab-panel" id="suggestions" data-panel="suggestions" aria-live="polite" hidden>
        <p class="loading">Loading market moves…</p>
      </section>
      <section class="timeline tab-panel" id="trends" data-panel="trends" aria-live="polite" hidden>
        <p class="loading">Loading Trends…</p>
      </section>
    </main>

    <footer class="footer">
      <p>Dates refresh automatically from Wikidata and official schedules. Always verify before relying on estimated dates.</p>
      <p class="footer-meta" id="footer-meta"></p>
    </footer>
  </div>

  <script type="module">
    const { bootstrap } = await import(`./js/site-rev.js?b=${Date.now()}`);
    await bootstrap();
  </script>
</body>
</html>
