<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f1219" />
  <meta name="description" content="Upcoming elections in OECD, BRICS, and other major countries over the next 12 months." />
  <title>Election Calendar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="page">
    <header class="page-header">
      <h1>Election Calendar</h1>
      <div class="toolbar" aria-label="Filter elections">
        <label class="search-wrap">
          <span class="sr-only">Search</span>
          <input type="search" id="search" placeholder="Search country, state, office…" autocomplete="off" enterkeyhint="search" />
        </label>

        <label class="toggle-states">
          <input type="checkbox" id="toggle-states" checked />
          <span>Show state elections</span>
        </label>
      </div>
    </header>

    <main>
      <section class="timeline" id="timeline" aria-live="polite">
        <p class="loading">Loading elections…</p>
      </section>
    </main>

    <footer class="footer">
      <p>Dates refresh automatically from Wikidata and official schedules. Always verify before relying on estimated dates.</p>
      <p class="footer-meta" id="footer-meta"></p>
    </footer>
  </div>

  <script type="module">
    const APP_REV = "5";
    let v = APP_REV;
    try {
      const res = await fetch(`data/meta.json?_=${Date.now()}`, { cache: "no-store" });
      if (res.ok) {
        const meta = await res.json();
        if (meta.generated_at) v = `${APP_REV}.${meta.generated_at}`;
      }
    } catch {}
    globalThis.__ECAL_V__ = v;
    await import(`./js/app.js?v=${v}`);
  </script>
</body>
</html>
