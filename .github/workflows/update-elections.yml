name: Update election data

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: bot-main-pushes
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build election data
        run: |
          python3 scripts/build_elections.py || SKIP_WIKIDATA=1 python3 scripts/build_elections.py
          python3 scripts/generate_us_primary_info.py
          python3 scripts/generate_presidential_info.py
          python3 scripts/generate_de_state_info.py
          python3 scripts/generate_us_governor_info.py
          python3 scripts/generate_us_senate_info.py
          python3 scripts/generate_mayoral_info.py
          python3 scripts/generate_national_election_info.py

      - name: Validate election data
        run: SKIP_WIKIDATA=1 python3 scripts/build_elections.py

      - name: Validate market coverage
        run: python3 scripts/validate_market_coverage.py

      - name: Commit data updates
        if: github.ref == 'refs/heads/main'
        run: |
          bash scripts/ci/commit_and_push.sh --bump-site-rev \
            --message "chore: refresh election calendar data" -- \
            data/elections.json \
            data/meta.json \
            data/curated/us_primary_info.json \
            data/curated/presidential_info.json \
            data/curated/de_state_info.json \
            data/curated/us_governor_info.json \
            data/curated/us_senate_info.json \
            data/curated/mayoral_info.json \
            data/curated/national_election_info.json
