name: Update election data

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build election data
        run: |
          python3 scripts/build_elections.py || SKIP_WIKIDATA=1 python3 scripts/build_elections.py
          python3 scripts/generate_us_primary_info.py
          python3 scripts/generate_presidential_info.py
          python3 scripts/generate_de_state_info.py
          python3 scripts/generate_us_governor_info.py

      - name: Validate election data
        run: SKIP_WIKIDATA=1 python3 scripts/build_elections.py

      - name: Commit data updates
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet data/elections.json data/meta.json data/curated/us_primary_info.json data/curated/presidential_info.json data/curated/de_state_info.json data/curated/us_governor_info.json; then
            echo "No election data changes."
          else
            git add data/elections.json data/meta.json data/curated/us_primary_info.json data/curated/presidential_info.json data/curated/de_state_info.json data/curated/us_governor_info.json
            git commit -m "chore: refresh election calendar data"
            git push
          fi
