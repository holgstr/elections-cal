name: Update site revision

on:
  push:
    branches: [main]
    paths-ignore:
      - data/site-rev.json

permissions:
  contents: write

jobs:
  update-site-rev:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Write deploy revision
        run: |
          REV=$(git rev-parse --short HEAD)
          printf '{\n  "rev": "%s"\n}\n' "$REV" > data/site-rev.json

      - name: Commit site revision
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet data/site-rev.json; then
            echo "Site revision already up to date."
          else
            git add data/site-rev.json
            git commit -m "chore: bump site revision for cache busting"
            git push
          fi
