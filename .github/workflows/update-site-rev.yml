name: Update site revision

on:
  push:
    branches: [main]
    paths-ignore:
      - data/site-rev.json

permissions:
  contents: write

concurrency:
  group: bot-main-pushes
  cancel-in-progress: false

jobs:
  update-site-rev:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Write deploy revision
        run: |
          REV=$(git rev-parse --short HEAD)
          printf '{\n  "rev": "%s"\n}\n' "$REV" > data/site-rev.json

      - name: Commit site revision
        run: |
          bash scripts/ci/commit_and_push.sh \
            --message "chore: bump site revision for cache busting" -- \
            data/site-rev.json
