name: Update Google Trends

on:
  schedule:
    # Shared with update-market-prices: 07:00 UTC and 19:00 UTC daily
    # (19:00 UTC ≈ 22:00 Europe/Tallinn in EEST / 21:00 in EET; Actions cron is UTC-only)
    - cron: "0 7 * * *"
    - cron: "0 19 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-trends:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Google Trends interest
        run: python3 scripts/fetch_google_trends.py

      - name: Commit Trends updates
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet data/trends.json; then
            echo "No Trends changes."
          else
            git add data/trends.json
            git commit -m "chore: refresh Google Trends race interest"
            REV=$(git rev-parse --short HEAD)
            printf '{\n  "rev": "%s"\n}\n' "$REV" > data/site-rev.json
            git add data/site-rev.json
            git commit -m "chore: bump site revision for cache busting"
            git push
          fi
