name: Update Google Trends

on:
  schedule:
    # Markets run at :00; Trends at :15 so long fetches rarely contend for main.
    # (19:15 UTC ≈ 22:15 Europe/Tallinn in EEST / 21:15 in EET; Actions cron is UTC-only)
    - cron: "15 7 * * *"
    - cron: "15 19 * * *"
  workflow_dispatch:

permissions:
  contents: write

# Serialize bot pushes to main; rebase retries still cover PR merges mid-run.
concurrency:
  group: bot-main-pushes
  cancel-in-progress: false

jobs:
  update-trends:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Google Trends interest
        run: python3 scripts/fetch_google_trends.py

      - name: Commit Trends updates
        if: github.ref == 'refs/heads/main'
        run: |
          bash scripts/ci/commit_and_push.sh --bump-site-rev \
            --message "chore: refresh Google Trends race interest" -- \
            data/trends.json \
            data/data_updated.json
