name: Update market prices

on:
  schedule:
    # Shared cadence with update-trends (Trends is staggered +15m).
    # (19:00 UTC ≈ 22:00 Europe/Tallinn in EEST / 21:00 in EET; Actions cron is UTC-only)
    - cron: "0 7 * * *"
    - cron: "0 19 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: bot-main-pushes
  cancel-in-progress: false

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Regenerate market info files
        run: |
          python3 scripts/generate_us_primary_info.py
          python3 scripts/generate_presidential_info.py
          python3 scripts/generate_de_state_info.py
          python3 scripts/generate_us_governor_info.py
          python3 scripts/generate_us_senate_info.py
          python3 scripts/generate_mayoral_info.py
          python3 scripts/generate_national_election_info.py

      - name: Fetch Polymarket prices
        run: python3 scripts/fetch_market_prices.py

      - name: Commit price updates
        if: github.ref == 'refs/heads/main'
        run: |
          bash scripts/ci/commit_and_push.sh --bump-site-rev \
            --message "chore: refresh Polymarket market prices" -- \
            data/market_prices/state.json \
            data/market_suggestions.json \
            data/market_odds_changes.json \
            data/market_odds.json
